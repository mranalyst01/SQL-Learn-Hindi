<!DOCTYPE html> 
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Practice — Hindi</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Sora:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --card: #1a2235;
    --border: #2a3a55;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --code-bg: #0d1117;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,14,26,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
  }
  .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 13px; margin-left: auto; }
  .progress-bar-wrap {
    display: flex; align-items: center; gap: 10px; margin-left: auto;
  }
  .progress-text { font-size: 12px; color: var(--accent); font-family: 'JetBrains Mono'; }
  .progress-track {
    width: 120px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s ease; border-radius: 2px;
  }

  /* LAYOUT */
  .layout {
    display: flex;
    min-height: calc(100vh - 73px);
    position: relative;
    z-index: 1;
  }

  /* SIDEBAR */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px 0;
  }
  .sidebar-title {
    font-size: 10px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0 20px 12px;
  }
  .topic-btn {
    width: 100%;
    text-align: left;
    padding: 12px 20px;
    background: none;
    border: none;
    color: var(--text);
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.2s;
    border-left: 3px solid transparent;
  }
  .topic-btn:hover { background: rgba(0,212,255,0.06); color: var(--accent); }
  .topic-btn.active {
    background: rgba(0,212,255,0.1);
    border-left-color: var(--accent);
    color: var(--accent);
    font-weight: 600;
  }
  .topic-num {
    font-family: 'JetBrains Mono';
    font-size: 10px;
    color: var(--muted);
    min-width: 20px;
  }
  .topic-btn.done .topic-num::after { content: ' ✓'; color: var(--accent3); }

  /* MAIN */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 40px;
  }

  /* SECTION TABS */
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 32px;
    background: var(--surface);
    padding: 4px;
    border-radius: 12px;
    width: fit-content;
    border: 1px solid var(--border);
  }
  .tab-btn {
    padding: 8px 20px;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    border-radius: 8px;
    transition: all 0.2s;
    font-weight: 500;
  }
  .tab-btn.active {
    background: var(--card);
    color: var(--accent);
    border: 1px solid var(--border);
  }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* CONTENT PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  /* TOPIC HEADER */
  .topic-header {
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .topic-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.2);
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 12px;
  }
  .topic-title {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 8px;
  }
  .topic-title span { color: var(--accent); }

  /* DEFINITION CARD */
  .def-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .def-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .def-card h3 {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .def-card p { line-height: 1.8; color: var(--text); font-size: 14px; }

  /* CODE BLOCK */
  .code-block {
    background: var(--code-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin: 16px 0;
    font-family: 'JetBrains Mono';
    font-size: 13px;
    line-height: 1.7;
    overflow-x: auto;
    position: relative;
  }
  .code-block .kw { color: #ff79c6; }
  .code-block .fn { color: #50fa7b; }
  .code-block .str { color: #f1fa8c; }
  .code-block .cm { color: #6272a4; }
  .code-block .tbl { color: #8be9fd; }
  .code-block .num { color: #bd93f9; }
  .code-label {
    font-size: 10px;
    color: var(--muted);
    font-family: 'Sora';
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  /* EXAMPLES */
  .examples-grid {
    display: grid;
    gap: 16px;
    margin-bottom: 24px;
  }
  .example-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: border-color 0.2s;
  }
  .example-card:hover { border-color: var(--accent); }
  .example-num {
    font-family: 'JetBrains Mono';
    font-size: 11px;
    color: var(--accent2);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .example-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 10px;
    color: var(--text);
  }
  .example-desc { font-size: 13px; color: var(--muted); margin-bottom: 12px; line-height: 1.6; }

  /* PRACTICE SECTION */
  .practice-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .practice-title { font-size: 20px; font-weight: 700; }
  .score-badge {
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    color: var(--accent3);
    padding: 6px 16px;
    border-radius: 20px;
    font-family: 'JetBrains Mono';
    font-size: 13px;
    font-weight: 700;
  }

  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 16px;
    transition: all 0.3s;
  }
  .q-card.answered-correct { border-color: var(--accent3); background: rgba(16,185,129,0.05); }
  .q-card.answered-wrong { border-color: var(--danger); background: rgba(239,68,68,0.05); }
  .q-num {
    font-family: 'JetBrains Mono';
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    margin-bottom: 10px;
  }
  .q-text { font-size: 14px; line-height: 1.7; margin-bottom: 16px; font-weight: 500; }
  .q-options { display: grid; gap: 8px; }
  .opt-btn {
    text-align: left;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    font-size: 13px;
    transition: all 0.2s;
    font-family: 'JetBrains Mono';
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(0,212,255,0.05); color: var(--accent); }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct { border-color: var(--accent3); background: rgba(16,185,129,0.15); color: var(--accent3); }
  .opt-btn.wrong { border-color: var(--danger); background: rgba(239,68,68,0.1); color: var(--danger); }
  .q-explanation {
    margin-top: 14px;
    padding: 14px;
    background: rgba(0,212,255,0.05);
    border: 1px solid rgba(0,212,255,0.15);
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    display: none;
  }
  .q-explanation.show { display: block; }
  .exp-label { color: var(--accent); font-weight: 600; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }

  .reset-btn {
    margin-top: 24px;
    padding: 12px 28px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 8px;
    color: white;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .reset-btn:hover { opacity: 0.85; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { padding: 20px; }
    .topic-title { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">SQL <span>सीखो</span></div>
  <div class="progress-bar-wrap">
    <span class="progress-text" id="progressText">0 / 11</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-title">SQL Topics</div>
    <div id="topicList"></div>
  </div>
  <div class="main" id="mainContent"></div>
</div>

<script>
const topics = [
  {
    id: 0,
    name: "SELECT & FROM",
    tag: "BASIC",
    definition: "SELECT statement SQL का सबसे basic और important command है। इसका उपयोग database की table से data को retrieve (निकालने) के लिए किया जाता है। FROM keyword यह बताता है कि data किस table से लेना है।",
    syntax: `<span class="kw">SELECT</span> column1, column2, ...
<span class="kw">FROM</span> table_name;

<span class="cm">-- सभी columns लेने के लिए:</span>
<span class="kw">SELECT</span> * <span class="kw">FROM</span> table_name;`,
    examples: [
      {
        title: "सभी data निकालना",
        desc: "Students table से सभी records लाओ",
        code: `<span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="tbl">students</span>;`
      },
      {
        title: "Specific columns",
        desc: "सिर्फ नाम और उम्र लाओ",
        code: `<span class="kw">SELECT</span> name, age <span class="kw">FROM</span> <span class="tbl">students</span>;`
      },
      {
        title: "Column Alias",
        desc: "Column का नाम बदलकर दिखाओ",
        code: `<span class="kw">SELECT</span> name <span class="kw">AS</span> <span class="str">'Student Name'</span>, age <span class="kw">AS</span> <span class="str">'Age'</span>
<span class="kw">FROM</span> <span class="tbl">students</span>;`
      }
    ],
    questions: [
      { q: "SELECT * FROM employees; — इसमें * का मतलब क्या है?", options: ["सिर्फ पहला column", "सभी columns", "सिर्फ numeric columns", "कोई column नहीं"], correct: 1, exp: "* (asterisk) का मतलब है सभी columns। यह table के हर column का data return करता है।" },
      { q: "Employees table से सिर्फ 'name' column निकालने के लिए सही query कौन सी है?", options: ["FROM employees SELECT name", "SELECT name FROM employees", "GET name FROM employees", "FETCH name FROM employees"], correct: 1, exp: "SQL में सही syntax है: SELECT column_name FROM table_name; इसलिए SELECT name FROM employees; सही है।" },
      { q: "SELECT statement का मुख्य काम क्या है?", options: ["Data delete करना", "Data insert करना", "Data retrieve करना", "Table बनाना"], correct: 2, exp: "SELECT का काम database से data को retrieve (निकालना) करना है। यह data को modify नहीं करता।" },
      { q: "SELECT name AS 'Employee Name' में AS keyword का क्या काम है?", options: ["Table का नाम बदलता है", "Column को alias (नया नाम) देता है", "Filter लगाता है", "Sort करता है"], correct: 1, exp: "AS keyword column या table को temporary alias (उपनाम) देने के लिए use होता है। Output में column का नाम बदल जाता है।" },
      { q: "क्या एक SELECT query में एक से ज्यादा columns select कर सकते हैं?", options: ["नहीं, सिर्फ एक", "हाँ, comma से separate करके", "हाँ, AND से", "हाँ, OR से"], correct: 1, exp: "हाँ! SELECT col1, col2, col3 FROM table; — columns को comma (,) से separate करके multiple columns select कर सकते हैं।" },
      { q: "निम्नलिखित में से कौन सा FROM का सही use है?", options: ["SELECT name students FROM", "FROM students SELECT name", "SELECT name FROM students", "SELECT FROM name students"], correct: 2, exp: "SQL का syntax है: SELECT columns FROM table_name; — FROM हमेशा table name से पहले आता है।" },
      { q: "SELECT DISTINCT name FROM students; — DISTINCT का क्या मतलब है?", options: ["सभी records", "सिर्फ duplicate records", "बिना duplicate के unique records", "Sorted records"], correct: 2, exp: "DISTINCT keyword duplicate values को हटाकर unique values ही दिखाता है।" },
      { q: "SQL में query के अंत में क्या लगाते हैं?", options: [". (dot)", ", (comma)", "; (semicolon)", "! (exclamation)"], correct: 2, exp: "SQL statements के अंत में semicolon (;) लगाया जाता है। यह query के end को indicate करता है।" },
      { q: "SELECT 5 * 10; का output क्या होगा?", options: ["Error", "510", "50", "5*10"], correct: 2, exp: "SELECT सिर्फ table से नहीं, expressions और calculations भी evaluate कर सकता है। 5*10 = 50 output आएगा।" },
      { q: "एक table में 5 columns हैं। SELECT * लिखने पर कितने columns आएंगे?", options: ["1", "3", "5", "0"], correct: 2, exp: "SELECT * सभी columns return करता है। 5 columns वाली table में SELECT * से 5 columns आएंगे।" }
    ]
  },
  {
    id: 1,
    name: "WHERE Clause",
    tag: "FILTERING",
    definition: "WHERE clause का उपयोग query में condition लगाने के लिए किया जाता है। यह सिर्फ उन्हीं rows को return करता है जो condition को satisfy करती हैं। बिना WHERE के सभी rows आती हैं।",
    syntax: `<span class="kw">SELECT</span> column1, column2
<span class="kw">FROM</span> table_name
<span class="kw">WHERE</span> condition;

<span class="cm">-- Operators: =, !=, >, <, >=, <=</span>
<span class="cm">-- Logical: AND, OR, NOT</span>`,
    examples: [
      {
        title: "Equal condition",
        desc: "Age 20 वाले students",
        code: `<span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="tbl">students</span>
<span class="kw">WHERE</span> age = <span class="num">20</span>;`
      },
      {
        title: "Multiple conditions (AND)",
        desc: "Age > 18 AND city = 'Delhi'",
        code: `<span class="kw">SELECT</span> name <span class="kw">FROM</span> <span class="tbl">students</span>
<span class="kw">WHERE</span> age > <span class="num">18</span> <span class="kw">AND</span> city = <span class="str">'Delhi'</span>;`
      },
      {
        title: "OR condition",
        desc: "Mumbai या Chennai के students",
        code: `<span class="kw">SELECT</span> * <span class="kw">FROM</span> <span class="tbl">students</span>
<span class="kw">WHERE</span> city = <span class="str">'Mumbai'</span> <span class="kw">OR</span> city = <span class="str">'Chennai'</span>;`
      }
    ],
    questions: [
      { q: "WHERE clause का मुख्य उद्देश्य क्या है?", options: ["Columns sort करना", "Rows filter करना", "Table create करना", "Data insert करना"], correct: 1, exp: "WHERE clause rows को filter करने के लिए use होता है — सिर्फ वही rows आती हैं जो condition को satisfy करती हैं।" },
      { q: "SELECT * FROM emp WHERE salary > 50000; — यह क्या करेगा?", options: ["50000 से कम salary वाले", "50000 salary वाले", "50000 से ज्यादा salary वाले", "सभी employees"], correct: 2, exp: "> operator 'greater than' है। salary > 50000 का मतलब 50000 से ज्यादा salary वाले employees।" },
      { q: "WHERE name = 'Rahul' AND age = 25 — दोनों conditions का क्या होगा?", options: ["कोई एक condition true होनी चाहिए", "दोनों conditions true होनी चाहिए", "दोनों false होनी चाहिए", "कोई भी true हो"], correct: 1, exp: "AND operator में दोनों conditions का true होना जरूरी है। तभी row return होगी।" },
      { q: "String values को WHERE में कैसे लिखते हैं?", options: ["WHERE name = Rahul", "WHERE name = [Rahul]", "WHERE name = 'Rahul'", "WHERE name == Rahul"], correct: 2, exp: "String (text) values को single quotes ('') में लिखा जाता है। जैसे: WHERE name = 'Rahul';" },
      { q: "WHERE age != 25 का मतलब क्या है?", options: ["Age 25 वाले", "Age 25 नहीं वाले", "Age 25 से ज्यादा", "Age 25 से कम"], correct: 1, exp: "!= operator 'not equal to' है। age != 25 का मतलब जिनकी age 25 नहीं है।" },
      { q: "OR operator कब true होता है?", options: ["जब दोनों conditions false हों", "जब कम से कम एक condition true हो", "जब दोनों conditions true हों", "कभी नहीं"], correct: 1, exp: "OR operator में कम से कम एक condition का true होना काफी है। A OR B — अगर A या B में से कोई एक true है तो result true।" },
      { q: "WHERE clause SELECT query में कहाँ आता है?", options: ["SELECT के पहले", "FROM के पहले", "FROM के बाद", "कहीं भी"], correct: 2, exp: "SQL का order है: SELECT → FROM → WHERE। इसलिए WHERE हमेशा FROM के बाद लिखते हैं।" },
      { q: "NOT operator का काम क्या है?", options: ["Condition को reverse करता है", "Values add करता है", "Sort करता है", "Duplicate हटाता है"], correct: 0, exp: "NOT operator condition को negate (उल्टा) करता है। WHERE NOT age = 20 का मतलब जिनकी age 20 नहीं है।" },
      { q: "BETWEEN operator का use क्या है?", options: ["दो values के बीच check करने के लिए", "NULL check करने के लिए", "String compare के लिए", "Sort के लिए"], correct: 0, exp: "BETWEEN range check करता है: WHERE age BETWEEN 18 AND 25 — 18 से 25 के बीच की age।" },
      { q: "WHERE salary >= 30000 में >= का मतलब?", options: ["सिर्फ 30000", "30000 से कम", "30000 या उससे ज्यादा", "30000 से ज्यादा"], correct: 2, exp: ">= का मतलब 'greater than or equal to' — 30000 और उससे ज्यादा। 30000 भी include होगा।" }
    ]
  },
  {
    id: 2,
    name: "ORDER BY",
    tag: "SORTING",

      {
        title: "Bank Transfer Transaction",
        desc: "पैसे transfer — दोनों operations एक साथ",
        code: `<span class="kw">START TRANSACTION</span>;
<span class="kw">UPDATE</span> <span class="tbl">accounts</span>
  <span class="kw">SET</span> bal = bal - <span class="num">500</span> <span class="kw">WHERE</span> id = <span class="num">1</span>;
<span class="kw">UPDATE</span> <span class="tbl">accounts</span>
  <span class="kw">SET</span> bal = bal + <span class="num">500</span> <span class="kw">WHERE</span> id = <span class="num">2</span>;
<span class="kw">COMMIT</span>;`
      },
      {
        title: "ROLLBACK example",
        desc: "Error पर undo करो",
        code: `<span class="kw">START TRANSACTION</span>;
<span class="kw">DELETE FROM</span> <span class="tbl">orders</span> <span class="kw">WHERE</span> id = <span class="num">5</span>;
<span class="cm">-- कुछ गलत हुआ...</span>
<span class="kw">ROLLBACK</span>;  <span class="cm">-- delete undo!</span>`
      },
      {
        title: "SAVEPOINT",
        desc: "Transaction में checkpoint",
        code: `<span class="kw">START TRANSACTION</span>;
<span class="kw">INSERT INTO</span> <span class="tbl">orders</span> <span class="kw">VALUES</span> (<span class="num">1</span>, <span class="str">'A'</span>);
<span class="kw">SAVEPOINT</span> sp1;
<span class="kw">INSERT INTO</span> <span class="tbl">orders</span> <span class="kw">VALUES</span> (<span class="num">2</span>, <span class="str">'B'</span>);
<span class="kw">ROLLBACK TO</span> sp1; <span class="cm">-- सिर्फ 2nd insert undo</span>
<span class="kw">COMMIT</span>;`
      }
    ],
    questions: [
      { q: "Transaction का मुख्य purpose क्या है?", options: ["Data fast insert करना", "Multiple operations को safely एक unit में execute करना", "Table create करना", "Index manage करना"], correct: 1, exp: "Transaction multiple SQL operations को एक logical unit बनाता है — सब complete होते हैं या सब fail होते हैं।" },
      { q: "ACID में A का मतलब?", options: ["Authorization", "Availability", "Atomicity", "Aggregation"], correct: 2, exp: "A = Atomicity — Transaction के सभी operations पूरे होंगे या एक भी नहीं। 'All or Nothing'।" },
      { q: "COMMIT का काम क्या है?", options: ["Transaction शुरू करना", "Transaction के changes permanently save करना", "Transaction undo करना", "Table lock करना"], correct: 1, exp: "COMMIT transaction के सभी changes को permanently database में save करता है।" },
      { q: "ROLLBACK क्या करता है?", options: ["Changes save करता है", "Transaction के uncommitted changes undo करता है", "New transaction शुरू करता है", "Data delete करता है"], correct: 1, exp: "ROLLBACK transaction के सभी uncommitted changes को undo करके database को previous state में ले जाता है।" },
      { q: "ACID में I (Isolation) का मतलब?", options: ["एक transaction दूसरे को affect नहीं करता", "Data permanent रहता है", "Rules maintain होते हैं", "All or nothing"], correct: 0, exp: "Isolation = concurrent transactions एक दूसरे से isolated रहते हैं। एक transaction के changes दूसरे को तब तक नहीं दिखते जब तक commit न हो।" },
      { q: "Durability का क्या मतलब है?", options: ["Transaction fast है", "Committed data permanent रहता है, crash के बाद भी", "Data duplicate नहीं होता", "Fast recovery"], correct: 1, exp: "Durability = COMMIT के बाद data permanent है। System crash के बाद भी data safe रहेगा।" },
      { q: "Bank transfer में Transaction क्यों जरूरी है?", options: ["Performance के लिए", "Debit और Credit दोनों एक साथ होने चाहिए या कोई नहीं", "Security के लिए", "Speed के लिए"], correct: 1, exp: "अगर debit हो जाए और credit fail हो, तो पैसे गायब हो जाएंगे। Transaction ensure करता है — दोनों होंगे या कोई नहीं।" },
      { q: "SAVEPOINT क्या करता है?", options: ["Transaction save करता है", "Transaction के अंदर checkpoint बनाता है", "Commit करता है", "Rollback करता है"], correct: 1, exp: "SAVEPOINT transaction के बीच में एक checkpoint बनाता है। ROLLBACK TO savepoint से सिर्फ उस point तक undo होता है।" },
      { q: "Consistency (ACID में C) का मतलब?", options: ["Data fast है", "Transaction के बाद database valid state में रहता है", "Data duplicate नहीं होता", "Data secure है"], correct: 1, exp: "Consistency = Transaction complete होने के बाद database सभी defined rules/constraints को satisfy करता है।" },
      { q: "AUTO-COMMIT क्या है?", options: ["Automatic backup", "हर statement automatically commit होता है", "Automatic rollback", "Automatic transaction start"], correct: 1, exp: "AUTO-COMMIT mode में हर SQL statement automatically commit हो जाता है। BEGIN TRANSACTION से इसे disable करते हैं।" }
    ]
  }
];

// State
let currentTopic = 0;
let currentTab = 'learn';
let answers = {};
let scores = {};

function init() {
  renderSidebar();
  renderContent(0);
  updateProgress();
}

function renderSidebar() {
  const list = document.getElementById('topicList');
  list.innerHTML = topics.map(t => `
    <button class="topic-btn ${t.id === currentTopic ? 'active' : ''} ${scores[t.id] !== undefined ? 'done' : ''}" 
      onclick="switchTopic(${t.id})">
      <span class="topic-num">${String(t.id + 1).padStart(2,'0')}</span>
      ${t.name}
    </button>
  `).join('');
}

function switchTopic(id) {
  currentTopic = id;
  currentTab = 'learn';
  renderSidebar();
  renderContent(id);
  document.querySelector('.main').scrollTop = 0;
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

function renderContent(id) {
  const t = topics[id];
  const main = document.getElementById('mainContent');
  
  const questionsHTML = t.questions.map((q, qi) => {
    const key = `${id}_${qi}`;
    const ans = answers[key];
    let cardClass = '';
    if (ans !== undefined) cardClass = ans === q.correct ? 'answered-correct' : 'answered-wrong';
    
    return `
    <div class="q-card ${cardClass}" id="qcard_${key}">
      <div class="q-num">Q${qi + 1} / ${t.questions.length}</div>
      <div class="q-text">${q.q}</div>
      <div class="q-options">
        ${q.options.map((opt, oi) => {
          let cls = '';
          if (ans !== undefined) {
            if (oi === q.correct) cls = 'correct';
            else if (oi === ans && ans !== q.correct) cls = 'wrong';
          }
          return `<button class="opt-btn ${cls}" 
            onclick="answer(${id}, ${qi}, ${oi})" 
            ${ans !== undefined ? 'disabled' : ''}>
            ${String.fromCharCode(65+oi)}. ${opt}
          </button>`;
        }).join('')}
      </div>
      <div class="q-explanation ${ans !== undefined ? 'show' : ''}" id="exp_${key}">
        <div class="exp-label">💡 Explanation</div>
        ${q.exp}
      </div>
    </div>`;
  }).join('');

  const score = scores[id];
  const scoreHTML = score !== undefined ? `${score}/${t.questions.length}` : '0/0';
  
  main.innerHTML = `
    <div class="topic-header">
      <div class="topic-tag">${t.tag}</div>
      <div class="topic-title"><span>#${id+1}</span> ${t.name}</div>
    </div>

    <div class="tabs">
      <button class="tab-btn ${currentTab === 'learn' ? 'active' : ''}" onclick="switchTab('learn', this)">📖 सीखो</button>
      <button class="tab-btn ${currentTab === 'practice' ? 'active' : ''}" onclick="switchTab('practice', this)">🎯 Practice</button>
    </div>

    <div id="panel-learn" class="panel ${currentTab === 'learn' ? 'active' : ''}">
      <div class="def-card">
        <h3>📌 Definition</h3>
        <p>${t.definition}</p>
      </div>

      <div class="def-card">
        <h3>⚙️ Syntax</h3>
        <div class="code-block">${t.syntax}</div>
      </div>

      <div class="def-card" style="border-top: 2px solid var(--accent3);">
        <h3 style="color:var(--accent3)">💡 Examples (${t.examples.length})</h3>
        <div class="examples-grid">
          ${t.examples.map((ex, i) => `
            <div class="example-card">
              <div class="example-num">EXAMPLE ${i+1}</div>
              <div class="example-title">${ex.title}</div>
              <div class="example-desc">${ex.desc}</div>
              <div class="code-block">${ex.code}</div>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div id="panel-practice" class="panel ${currentTab === 'practice' ? 'active' : ''}">
      <div class="practice-header">
        <div class="practice-title">🎯 Practice Questions</div>
        <div class="score-badge" id="scoreDisplay_${id}">
          Score: ${scoreHTML}
        </div>
      </div>
      ${questionsHTML}
      <button class="reset-btn" onclick="resetTopic(${id})">🔄 Reset Questions</button>
    </div>

    <div style="display:flex; justify-content:space-between; margin-top:32px; gap:12px; flex-wrap:wrap; padding-bottom:40px;">
      ${id > 0 ? `<button onclick="switchTopic(${id-1})" style="padding:12px 22px; background:var(--card); border:2px solid var(--border); border-radius:10px; color:var(--text); cursor:pointer; font-family:'Sora',sans-serif; font-size:13px; font-weight:600;" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--accent)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text)'">← ${topics[id-1].name}</button>` : '<div></div>'}
      ${id < topics.length-1 ? `<button onclick="switchTopic(${id+1})" style="padding:12px 22px; background:linear-gradient(135deg,var(--accent2),var(--accent)); border:none; border-radius:10px; color:white; cursor:pointer; font-family:'Sora',sans-serif; font-size:13px; font-weight:700;">Agla Topic: ${topics[id+1].name} →</button>` : '<div style="padding:12px 20px;color:var(--accent3);font-weight:700;font-size:15px;">🎉 Saare Topics Complete!</div>'}
    </div>
  `;
}

function answer(topicId, qIdx, optIdx) {
  const key = `${topicId}_${qIdx}`;
  if (answers[key] !== undefined) return;
  
  answers[key] = optIdx;
  const q = topics[topicId].questions[qIdx];
  const isCorrect = optIdx === q.correct;
  
  // Update card
  const card = document.getElementById(`qcard_${key}`);
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
  
  // Update buttons
  card.querySelectorAll('.opt-btn').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.correct) btn.classList.add('correct');
    else if (i === optIdx && !isCorrect) btn.classList.add('wrong');
  });
  
  // Show explanation
  document.getElementById(`exp_${key}`).classList.add('show');
  
  // Update score
  updateScore(topicId);
  updateProgress();
}

function updateScore(topicId) {
  const t = topics[topicId];
  let correct = 0;
  t.questions.forEach((q, qi) => {
    const key = `${topicId}_${qi}`;
    if (answers[key] === q.correct) correct++;
  });
  scores[topicId] = correct;
  const el = document.getElementById(`scoreDisplay_${topicId}`);
  if (el) el.textContent = `Score: ${correct}/${t.questions.length}`;
  renderSidebar();
}

function resetTopic(topicId) {
  const t = topics[topicId];
  t.questions.forEach((q, qi) => {
    delete answers[`${topicId}_${qi}`];
  });
  delete scores[topicId];
  renderContent(topicId);
  updateProgress();
  renderSidebar();
}

function updateProgress() {
  const completed = Object.keys(scores).length;
  const total = topics.length;
  document.getElementById('progressText').textContent = `${completed} / ${total}`;
  document.getElementById('progressFill').style.width = `${(completed/total)*100}%`;
}

init();
</script>
</body>
</html>
